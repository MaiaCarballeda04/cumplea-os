<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0e15;
            --primary: #00ff66;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --cake-color: #1e293b;
            --frosting: #38bdf8;
            --font: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .instruction {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- Animación de la Torta --- */
        .cake-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px auto;
            cursor: pointer;
        }

        .cake {
            position: absolute;
            bottom: 10px;
            left: 25px;
            width: 150px;
            height: 90px;
            background-color: var(--cake-color);
            border: 2px solid #334155;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .cake-wrapper:hover .cake {
            transform: scale(1.02);
        }

        .frosting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background-color: var(--frosting);
            border-bottom: 4px dashed #0284c7;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        /* Velas */
        .candles {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .candle {
            width: 8px;
            height: 35px;
            background: linear-gradient(to bottom, #f43f5e, #be123c);
            position: relative;
        }

        .flame {
            position: absolute;
            top: -12px;
            left: -2px;
            width: 12px;
            height: 12px;
            background-color: #fbbf24;
            border-radius: 50% 50% 20% 50%;
            transform: rotate(-45deg);
            box-shadow: 0 0 10px #f59e0b;
            animation: flicker 0.6s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-43deg) scale(1.1); }
        }

        .gift-section {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .gift-section.show {
            display: block;
            opacity: 1;
        }

        .character-scene {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            height: 110px;
            margin-bottom: 30px;
            position: relative;
        }

        /* GATITO */
        .cat {
            position: relative;
            width: 65px;
            height: 60px;
            background-color: #1e2029;
            border-radius: 40px 40px 30px 30px;
            border: 2px solid #2e303f;
        }

        /* Orejas del gato */
        .cat::before, .cat::after {
            content: '';
            position: absolute;
            top: -12px;
            width: 0;
            height: 0;
            border-bottom: 18px solid #1e2029;
        }
        .cat::before {
            left: 4px;
            border-left: 10px solid transparent;
            border-right: 14px solid transparent;
            transform: rotate(-15deg);
        }
        .cat::after {
            right: 4px;
            border-right: 10px solid transparent;
            border-left: 14px solid transparent;
            transform: rotate(15deg);
        }

        /* Ojos del gato */
        .cat-eyes {
            position: absolute;
            top: 22px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 12px;
        }
        .cat-eye {
            width: 8px;
            height: 8px;
            background-color: #fbbf24;
            border-radius: 50%;
            position: relative;
        }
        .cat-eye::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 3px;
            width: 2px;
            height: 6px;
            background-color: #000;
            border-radius: 1px;
        }

        .cat-nose {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 3px;
            background-color: #f43f5e;
            border-radius: 50%;
        }

        .cat-tail {
            position: absolute;
            bottom: 2px;
            right: -14px;
            width: 16px;
            height: 25px;
            border-right: 5px solid #1e2029;
            border-radius: 0 8px 12px 0;
            transform-origin: bottom left;
            animation: wag 1.5s ease-in-out infinite alternate;
        }

        @keyframes wag {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(18deg); }
        }

        .mini-robot {
            position: relative;
            width: 50px;
            height: 50px;
            background-color: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            animation: float-bot 2s ease-in-out infinite alternate;
        }

        @keyframes float-bot {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        .mini-robot::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 10px;
            background-color: #475569;
        }
        .robot-light {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        .robot-eyes {
            position: absolute;
            top: 16px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .robot-eye {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 2px;
            box-shadow: 0 0 6px var(--primary);
            animation: blink-eye 4s infinite;
        }

        @keyframes blink-eye {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        .asimov-box {
            background-color: rgba(30, 41, 59, 0.25);
            border-left: 3px solid var(--primary);
            padding: 15px 20px;
            margin-bottom: 25px;
            text-align: left;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .asimov-box.fade-in {
            opacity: 1;
        }

        #quote-text {
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        #quote-source {
            font-size: 0.8rem;
            color: var(--primary);
            text-align: right;
        }

        .wishes {
            text-align: left;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 4px;
        }

        .wishes h1 {
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .wishes p {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.6;
            min-height: 80px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--primary);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="interactive-mesh">
            <p class="instruction" id="hint-text"> Hace clic en las velas para apagarlas </p>
            
            <div class="cake-wrapper" id="cake-click">
                <div class="candles">
                    <div class="candle" id="c1"><div class="flame"></div></div>
                    <div class="candle" id="c2"><div class="flame"></div></div>
                    <div class="candle" id="c3"><div class="flame"></div></div>
                </div>
                <div class="cake">
                    <div class="frosting"></div>
                </div>
            </div>
        </div>

        <div class="gift-section" id="gift-box">     
            <div class="character-scene">
                <div class="cat">
                    <div class="cat-eyes">
                        <div class="cat-eye"></div>
                        <div class="cat-eye"></div>
                    </div>
                    <div class="cat-nose"></div>
                    <div class="cat-tail"></div>
                </div>
                
                <!-- Pequeño Robot Compañero -->
                <div class="mini-robot">
                    <div class="robot-light"></div>
                    <div class="robot-eyes">
                        <div class="robot-eye"></div>
                        <div class="robot-eye"></div>
                    </div>
                </div>
            </div>
            
            <!-- Cita de Asimov -->
            <div class="asimov-box" id="asimov-block">
                <p id="quote-text">"Para tener éxito, la planificación sola no es suficiente. Uno debe improvisar también... El curso de la historia lo cambian los nuevos rumbos."</p>
                <div id="quote-source">— Isaac Asimov, <em>Fundación</em></div>
            </div>
            
            <!-- Mensaje interactivo de corazón -->
            <div class="wishes">
                <h1>¡Feliz Cumpleaños, Franco!</h1>
                <p id="typed-text"></p><span id="terminal-cursor" class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const cakeBtn = document.getElementById('cake-click');
        const giftBox = document.getElementById('gift-box');
        const asimovBlock = document.getElementById('asimov-block');
        const typedTextEl = document.getElementById('typed-text');
        const cursorEl = document.getElementById('terminal-cursor');
        const flames = document.querySelectorAll('.flame');
        
        let clicks = 0;

        const messageText = "un pequeño regalo digital, feliz cumpleaños Franco";

        let index = 0;

        function typeWriter() {
            if (index < messageText.length) {
                typedTextEl.textContent += messageText.charAt(index);
                index++;
                setTimeout(typeWriter, 35); 
            } else {
                cursorEl.style.display = 'none';
            }
        }

        function launchConfetti() {
            const duration = 2.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#00ff66', '#38bdf8', '#fbbf24', '#f43f5e']
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#00ff66', '#38bdf8', '#fbbf24', '#f43f5e']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        cakeBtn.addEventListener('click', () => {
            if (clicks < flames.length) {
                flames[clicks].style.display = 'none';
                clicks++;
            }
            
            if (clicks === flames.length) {
                launchConfetti();

                setTimeout(() => {
                    document.getElementById('interactive-mesh').style.display = 'none';
                    giftBox.classList.add('show');
                    
                    setTimeout(() => {
                        asimovBlock.classList.add('fade-in');
                        setTimeout(typeWriter, 800);
                    }, 300);
                    
                }, 500);
            }
        });
    </script>
</body>
</html>
