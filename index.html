<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --primary: #00ff66;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --cake-color: #1e293b;
            --frosting: #38bdf8;
            --font: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .instruction {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* --- Animación de la Torta --- */
        .cake-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px auto;
            cursor: pointer;
        }

        .cake {
            position: absolute;
            bottom: 10px;
            left: 25px;
            width: 150px;
            height: 90px;
            background-color: var(--cake-color);
            border: 2px solid #334155;
            border-radius: 8px;
        }

        .frosting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background-color: var(--frosting);
            border-bottom: 4px dashed #0284c7;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        /* Velas virtuales (Bits) */
        .candles {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .candle {
            width: 8px;
            height: 35px;
            background: linear-gradient(to bottom, #f43f5e, #be123c);
            position: relative;
            transition: opacity 0.3s ease;
        }

        .flame {
            position: absolute;
            top: -12px;
            left: -2px;
            width: 12px;
            height: 12px;
            background-color: #fbbf24;
            border-radius: 50% 50% 20% 50%;
            transform: rotate(-45deg);
            box-shadow: 0 0 10px #f59e0b;
            animation: flicker 0.6s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-43deg) scale(1.1); }
        }

        /* --- Contenedor de Regalo Oculto --- */
        .gift-section {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .gift-section.show {
            display: block;
            opacity: 1;
        }

        /* Pequeño diseño pixel art del robot */
        .robot-pixel {
            font-size: 0.75rem;
            line-height: 1.2;
            color: var(--primary);
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border: 1px solid #1e293b;
            display: inline-block;
            margin-bottom: 20px;
            text-align: left;
        }

        .wishes h1 {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .wishes p {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="interactive-mesh">
            <p class="instruction" id="hint-text">> Haz clic en las velas para apagarlas_</p>
            
            <div class="cake-wrapper" id="cake-click">
                <div class="candles">
                    <div class="candle" id="c1"><div class="flame"></div></div>
                    <div class="candle" id="c2"><div class="flame"></div></div>
                    <div class="candle" id="c3"><div class="flame"></div></div>
                </div>
                <div class="cake">
                    <div class="frosting"></div>
                </div>
            </div>
        </div>

        <div class="gift-section" id="gift-box">
            <div class="robot-pixel">
<pre>
   [o_o]  
   /[ ]\  
   _|_|_  
 /       \
|  HBD!!  |
 \_______/
</pre>
            </div>
            
            <div class="wishes">
                <h1>¡Feliz Cumpleaños!</h1>
                <p>un pequeño regalo digital para recordarte que cada vuelta al sol es un reinicio completo del sistema, feliz cumpleaños </p>
            </div>
        </div>
    </div>

    <script>
        const cakeBtn = document.getElementById('cake-click');
        const hintText = document.getElementById('hint-text');
        const giftBox = document.getElementById('gift-box');
        
        const flames = document.querySelectorAll('.flame');
        let clicks = 0;

        cakeBtn.addEventListener('click', () => {
            if (clicks < flames.length) {
                // Va apagando las llamas una a una por cada clic
                flames[clicks].style.display = 'none';
                clicks++;
            }
            
            if (clicks === flames.length) {
                // Cuando apaga todas, cambia la pantalla suavemente
                setTimeout(() => {
                    document.getElementById('interactive-mesh').style.display = 'none';
                    giftBox.classList.add('show');
                }, 500);
            }
        });
    </script>
</body>
</html>
